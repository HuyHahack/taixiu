# render.yaml
services:
  - type: worker
    name: discord-economy-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: SUPER_ADMIN_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
